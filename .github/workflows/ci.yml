name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run test suite
        run: bash tests/test-install.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        run: |
          find install.sh uninstall.sh tests .github/scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck
